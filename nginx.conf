server {
    listen 3003;

    # Log real client IP from Cloudflare CF-Connecting-IP header
    access_log /var/log/nginx/client-ip-table-secret cf_ip;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Serve IP log file sorted by timestamp as a downloadable CSV via local CGI script
    location = /client-ip-table-secret {
        proxy_pass http://127.0.0.1:8080/cgi-bin/download.sh;
    }
}
