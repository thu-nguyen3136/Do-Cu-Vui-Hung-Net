server {
    listen 3003;

    # Log real client IP from Cloudflare CF-Connecting-IP header
    access_log /var/log/nginx/client-ip-table-secret cf_ip;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Serve IP log file as a downloadable CSV at this URL
    location = /client-ip-table-secret {
        alias /var/log/nginx/client-ip-table-secret;
        add_header Content-Type 'text/plain; charset=UTF-8';
        add_header Content-Disposition 'attachment; filename="client-ip-table-secret.csv"';
        add_header Cache-Control 'no-store, no-cache';
    }
}
