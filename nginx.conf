server {
    listen 3003;

    # Custom log format to capture real client IP from Cloudflare header
    log_format cf_ip '$http_cf_connecting_ip - $remote_addr [$time_local] '
                     '"$request" $status '
                     '"$http_user_agent"';

    access_log /var/log/nginx/client-ip-table-secret cf_ip;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
