version: '3.8'

services:
  web-local:
    build:
      context: .
      target: dev
    ports:
      - "3003:3003"
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - PORT=3003
      - NODE_ENV=development
      - TZ=Asia/Ho_Chi_Minh
