name: Docker Build and Publish

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: adminvpshub/do-cu-vui-hung

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.GH_USER }}
          password: ${{ secrets.GH_PAT }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Setup Cloudflared and SSH
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking no
          EOF

      - name: Deploy to Server
        env:
          SERVER_SSH_CONNECTION: ${{ vars.SERVER_SSH_CONNECTION }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          SERVER_SSH_HOSTNAME: ${{ vars.SERVER_SSH_HOSTNAME }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USER: ${{ vars.GH_USER }}
        run: |
          # Generate docker-compose.prod.yml using DEPLOY_PATH for volume (no hardcoded absolute path)
          cat << EOF > docker-compose.prod.yml
          services:
            web-production:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
              ports:
                - "3003:3003"
              restart: unless-stopped
              volumes:
<<<<<<< HEAD
                - ${DEPLOY_PATH}/logs:/var/log/nginx
              environment:
                - DEPLOY_PATH=${DEPLOY_PATH}
=======
                - /home/tgh2171/www/html/do-cu-vui-hung-net/logs:/var/log/nginx
>>>>>>> origin/main
          EOF

          # Generate logrotate config with actual DEPLOY_PATH substituted
          sed "s|DEPLOY_PATH|${DEPLOY_PATH}|g" logrotate.conf > logrotate.prod.conf

          # Flatten any newlines that might be in the secret to prevent 'access: command not found' errors
          SSH_CMD="${SERVER_SSH_CONNECTION//$'\n'/ }"
          SSH_CMD="${SSH_CMD//\\/ }" # Remove trailing slashes if they were used for multiline escaping
          SSH_CMD="${SSH_CMD//\{\{SERVER_USER\}\}/$SERVER_USER}"
          SSH_CMD="${SSH_CMD//\{\{SERVER_SSH_HOSTNAME\}\}/$SERVER_SSH_HOSTNAME}"

          # Ensure deploy and logs directories exist
          eval "$SSH_CMD \"if [ ! -d $DEPLOY_PATH ]; then mkdir -p $DEPLOY_PATH; fi\""
          eval "$SSH_CMD \"if [ ! -d $DEPLOY_PATH/logs ]; then mkdir -p $DEPLOY_PATH/logs; fi\""

          # Copy files to server
          cat docker-compose.prod.yml | eval "$SSH_CMD \"cat > $DEPLOY_PATH/docker-compose.yml\""
          cat logrotate.prod.conf | eval "$SSH_CMD \"cat > $DEPLOY_PATH/logrotate.conf\""

          # Register logrotate cron job (daily at 2am) if not already set
          eval "$SSH_CMD \"(crontab -l 2>/dev/null | grep -qF 'logrotate $DEPLOY_PATH' || (crontab -l 2>/dev/null; echo '0 2 * * * /usr/sbin/logrotate $DEPLOY_PATH/logrotate.conf --state $DEPLOY_PATH/logrotate.status') | crontab -)\""

          # Pull latest image and restart container
          eval "$SSH_CMD \"cd $DEPLOY_PATH && sudo docker logout ghcr.io && echo '$GH_PAT' | sudo docker login ghcr.io -u '$GH_USER' --password-stdin && sudo docker compose pull && (sudo fuser -k 3003/tcp || true) && sudo docker ps -q --filter publish=3003 | xargs -r sudo docker rm -f && DEPLOY_PATH=$DEPLOY_PATH sudo docker compose up -d\""
